<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StarCraft TMG SFX Companion</title>
    <!-- Google Fonts for StarCraft/Sci-Fi HUD styling -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=ogg-v2">
</head>
<body class="theme-neutral">
    
    <!-- CRT Overlay & Grid Lines for authentic retro console vibe -->
    <div class="crt-overlay"></div>
    <div class="crt-scanlines"></div>

    <div class="app-container">
        <!-- Main Sticky Top Header -->
        <header class="app-header">
            <div class="hud-top-border"></div>
            <div class="hud-main-bar">
                <img src="pics/app_logo.png" class="hud-logo" alt="SC TMG Logo">
                <button id="btn-stop-all" class="hud-btn-danger" title="Stop all playing sounds">STOP ALL</button>
            </div>
            
            <!-- Faction Nav Tabs -->
            <nav class="hud-tabs">
                <button class="tab-btn active" data-tab="ost">
                    <span class="tab-icon-img" style="width: 35px; height: 18px; margin-top: 6px; margin-bottom: 10px; -webkit-mask-image: url('pics/sc_logo.png'); mask-image: url('pics/sc_logo.png');"></span>
                    <span class="tab-text">CONTROL CENTER</span>
                </button>
                <button class="tab-btn" data-tab="terran">
                    <span class="tab-icon-img" style="width: 30px; height: 30px; -webkit-mask-image: url('pics/terran_logo.png'); mask-image: url('pics/terran_logo.png');"></span>
                    <span class="tab-text">TERRAN</span>
                </button>
                <button class="tab-btn" data-tab="zerg">
                    <span class="tab-icon-img" style="width: 31px; height: 35px; margin-top: -3px; margin-bottom: 2px; -webkit-mask-image: url('pics/zerg%20logo.png'); mask-image: url('pics/zerg%20logo.png');"></span>
                    <span class="tab-text">ZERG</span>
                </button>
                <button class="tab-btn" data-tab="protoss">
                    <span class="tab-icon-img" style="width: 19px; height: 38px; margin-top: -5px; margin-bottom: 1px; -webkit-mask-image: url('pics/protoss_logo.png'); mask-image: url('pics/protoss_logo.png');"></span>
                    <span class="tab-text">PROTOSS</span>
                </button>
            </nav>
            
            <!-- Global Volume HUD Controls -->
            <div class="global-controls">
                <div class="vol-control">
                    <span class="vol-label">OST VOL</span>
                    <input type="range" id="volume-ost" min="0" max="100" value="50" class="hud-slider">
                    <span class="vol-value" id="vol-ost-val">50%</span>
                </div>
                <div class="vol-control">
                    <span class="vol-label">SFX VOL</span>
                    <input type="range" id="volume-sfx" min="0" max="100" value="80" class="hud-slider">
                    <span class="vol-value" id="vol-sfx-val">80%</span>
                </div>
            </div>
        </header>

        <!-- Search Bar (hidden on OST tab, shown on Faction tabs) -->
        <div id="search-container" class="search-container hidden">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="unit-search" placeholder="FILTER UNITS..." autocomplete="off">
                <button id="clear-search" class="clear-btn">&times;</button>
            </div>
        </div>

        <!-- Main Scrollable Content -->
        <main class="app-content">

            <!-- OST PLAYER VIEW -->
            <section id="view-ost" class="tab-view active">
                <div class="console-panel">
                    <div class="panel-header">BATTLE MUSIC INJECTOR</div>
                    
                    <!-- CRT Song Display -->
                    <div class="crt-display-panel">
                        <div class="crt-glow-grid"></div>
                        <div class="display-label">AUDIO SOURCE TRANSMISSION STATUS</div>
                        <div id="ost-status-indicator" class="display-status">IDLE</div>
                        <div class="display-label">CURRENT TRACK</div>
                        <div class="display-track-container">
                            <div id="ost-track-title" class="display-track">NO BATTLE MUSIC ACTIVE</div>
                        </div>
                    </div>

                    <!-- Simplified Play/Pause Toggle -->
                    <div class="play-controls-container">
                        <button id="btn-ost-play-pause" class="huge-play-btn">
                            <span class="play-icon">▶</span> PLAY MUSIC
                        </button>
                    </div>

                    <!-- Configuration Options -->
                    <div class="config-grid">
                        <!-- StarCraft Version Select -->
                        <div class="config-card">
                            <div class="card-title">GAME VERSION</div>
                            <div class="toggle-group">
                                <label class="hud-checkbox-container">
                                    <input type="checkbox" id="version-sc1" checked>
                                    <span class="hud-checkbox"></span>
                                    STARCRAFT I
                                </label>
                                <label class="hud-checkbox-container">
                                    <input type="checkbox" id="version-sc2" checked>
                                    <span class="hud-checkbox"></span>
                                    STARCRAFT II
                                </label>
                            </div>
                        </div>

                        <!-- Faction Tracks Select -->
                        <div class="config-card">
                            <div class="card-title">MUSIC TACTICAL FACTION</div>
                            <div class="toggle-group">
                                <label class="hud-checkbox-container">
                                    <input type="checkbox" id="race-terran" checked>
                                    <span class="hud-checkbox"></span>
                                    TERRAN TRACKS
                                </label>
                                <label class="hud-checkbox-container">
                                    <input type="checkbox" id="race-zerg" checked>
                                    <span class="hud-checkbox"></span>
                                    ZERG TRACKS
                                </label>
                                <label class="hud-checkbox-container">
                                    <input type="checkbox" id="race-protoss" checked>
                                    <span class="hud-checkbox"></span>
                                    PROTOSS TRACKS
                                </label>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Attribution Section -->
                    <div class="hud-attribution">
                        <span>Made by</span>
                        <a href="https://github.com/JerryJohnsonLee" target="_blank" class="author-link">
                            <img src="pics/author_avatar.jpg" class="author-avatar" alt="JerryJohnsonLee">
                            JerryJohnsonLee
                        </a>
                        <span>with</span>
                        <span class="antigravity-brand">
                            <svg class="antigravity-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="50" cy="50" r="40" stroke="currentColor" stroke-width="2" fill="none" opacity="0.3" stroke-dasharray="5 5" />
                                <circle cx="50" cy="50" r="28" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.2" />
                                <path d="M50,22 L75,70 L62,70 L50,44 L38,70 L25,70 Z" fill="currentColor" />
                                <circle cx="50" cy="12" r="4" fill="currentColor" class="floating-particle" />
                            </svg>
                            Antigravity
                        </span>
                    </div>
                </div>
            </section>

            <!-- TERRAN SFX VIEW -->
            <section id="view-terran" class="tab-view">
                <div id="terran-unit-container" class="units-grid">
                    <!-- Loaded dynamically via app.js -->
                </div>
            </section>

            <!-- ZERG SFX VIEW -->
            <section id="view-zerg" class="tab-view">
                <div id="zerg-unit-container" class="units-grid">
                    <!-- Loaded dynamically via app.js -->
                </div>
            </section>

            <!-- PROTOSS SFX VIEW -->
            <section id="view-protoss" class="tab-view">
                <div id="protoss-unit-container" class="units-grid">
                    <!-- Loaded dynamically via app.js -->
                </div>
            </section>

        </main>
    </div>

    <!-- Web Audio & Core Javascript Files -->
    <script src="audio-registry.js?v=ogg-v2"></script>
    <script src="app.js?v=ogg-v2"></script>
</body>
</html>
